<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Welcome</title>
  <style>

    button {
    margin: 20px;
    }
    .custom-btn {
    width: 130px;
    height: 40px;
    color: #fff;
    border-radius: 5px;
    padding: 10px 25px;
    font-family: 'Lato', sans-serif;
    font-weight: 500;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    display: inline-block;
    box-shadow:inset 2px 2px 2px 0px rgba(255,255,255,.5),
    7px 7px 20px 0px rgba(0,0,0,.1),
    4px 4px 5px 0px rgba(0,0,0,.1);
    outline: none;
    }


    .btn-13 {
    background-color: #89d8d3;
    background-image: linear-gradient(315deg, #89d8d3 0%, #03c8a8 74%);
    border: none;
    z-index: 1;
    }
    .btn-13:after {
    position: absolute;
    content: "";
    width: 100%;
    height: 0;
    bottom: 0;
    left: 0;
    z-index: -1;
    border-radius: 5px;
    background-color: #4dccc6;
    background-image: linear-gradient(315deg, #4dccc6 0%, #96e4df 74%);
    box-shadow:
    -7px -7px 20px 0px #fff9,
    -4px -4px 5px 0px #fff9,
    7px 7px 20px 0px #0002,
    4px 4px 5px 0px #0001;
    transition: all 0.3s ease;
    }
    .btn-13:hover {
    color: #fff;
    }
    .btn-13:hover:after {
    top: 0;
    height: 100%;
    }
    .btn-13:active {
    top: 2px;
    }

        .cta-btn-1{
        background-color:rgba(12, 124, 124, 1);
        color: white;
        padding: 10px 30px;
        border-radius: 5px;
        width: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .cta-btn-1:hover{
    background-color: rgba(86, 97, 113, 1);
    }

    .btn-3 {
    background: rgb(0,172,238);
    background: linear-gradient(0deg, rgba(0,172,238,1) 0%, rgba(2,126,251,1) 100%);
    width: 130px;
    height: 40px;
    line-height: 42px;
    padding: 0;
    border: none;
    
    }
    .cta-btn-1 span {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
    }
    .cta-btn-1:before,
    .cta-btn-1:after {
    position: absolute;
    content: "";
    right: 0;
    top: 0;
    background:  rgba(15, 125, 125, 1);
    transition: all 0.3s ease;
    }
    .cta-btn-1:before {
    height: 0%;
    width: 2px;
    }
    .cta-btn-1:after {
    width: 0%;
    height: 2px;
    }
    .cta-btn-1:hover{
    background: transparent;
    box-shadow: none;
    }
    .cta-btn-1:hover:before {
    height: 100%;
    }
    .cta-btn-1:hover:after {
    width: 100%;
    }
    .cta-btn-1 span:hover{
    color: rgba(15, 125, 125, 1);
    }
    .cta-btn-1 span:before,
    .cta-btn-1 span:after {
    position: absolute;
    content: "";
    left: 0;
    bottom: 0;
    background: rgba(15, 125, 125, 1);
    transition: all 0.3s ease;
    }
    .cta-btn-1 span:before {
    width: 2px;
    height: 0%;
    }
    .cta-btn-1 span:after {
    width: 0%;
    height: 2px;
    }
    .cta-btn-1 span:hover:before {
    height: 100%;
    }
    .cta-btn-1 span:hover:after {
    width: 100%;
}



  </style>
</head>
<body>

   <a class="cta-btn-1" href=""><span> Hire Me</span></a>
 <button class="custom-btn btn-13">Read More</button>
  <button class="custom-btn btn-3"><span>Read More</span></button>

</body>
</html>
